services:
  graphdb:
    image: falkordb/falkordb:latest
    command: ["redis-server", "--maxmemory", "1gb", "--loadmodule", "/usr/lib/redis/modules/falkordb.so"]
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:3000:3000"
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build: .
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - FALKORDB_HOST=graphdb
      - FALKORDB_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_API_URL=http://embeddings:8000
    depends_on:
      graphdb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./backups:/app/backups
      - falkordb_data:/mnt/falkor_data:ro
      - qdrant_data:/mnt/qdrant_data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: streamlit run src/dashboard/app.py

  embeddings:
    build: .
    environment:
      - PORT=8000
    ports:
      - "127.0.0.1:8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: python src/claude_memory/embedding_server.py

volumes:
  falkordb_data:
  qdrant_data:
