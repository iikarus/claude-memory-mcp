services:
  graphdb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - FALKORDB_HOST=graphdb
      - FALKORDB_PORT=6379
      # Dashboard needs to talk to logic layer? No, logic layer is library code imported by dashboard.
      # So Dashboard ALSO needs to talk to Embedding Service.
      - EMBEDDING_API_URL=http://embeddings:8000
    depends_on:
      - graphdb
      - embeddings
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./backups:/app/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - falkordb_data:/mnt/falkor_data:ro
      - qdrant_data:/mnt/qdrant_data:ro
    restart: unless-stopped
    command: streamlit run src/dashboard/app.py

  embeddings:
    build: .
    environment:
      - PORT=8000
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    command: python src/claude_memory/embedding_server.py

  server:
    build: .
    environment:
      - FALKORDB_HOST=graphdb
      - FALKORDB_PORT=6379
      - QDRANT_HOST=qdrant
      - MCP_TRANSPORT=sse
      - PORT=8000
      - EMBEDDING_API_URL=http://embeddings:8000
    ports:
      - "8000:8000"
    depends_on:
      - graphdb
      - embeddings
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
    restart: unless-stopped
    # Lightweight logic server
    command: python src/claude_memory/server.py

volumes:
  falkordb_data:
  qdrant_data:
