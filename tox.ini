[tox]
envlist = pulse, gate, hammer, polish
isolated_build = True

[testenv]
allowlist_externals = poetry

# Tier 0: The Pulse (Fast, Frequent)
[testenv:pulse]
description = Run fast checks: Ruff (lint/format), Pytest (Unit), Pre-commit
deps =
    ruff
    mypy
    pytest
    pytest-asyncio
    pytest-cov
    pre-commit
commands =
    ruff check src tests
    ruff format --check src tests
    mypy src
    pytest -m "not slow" --cov=claude_memory --cov=dashboard --cov-report=term-missing --cov-fail-under=30

# Tier 1: The Gate (Correctness, Pre-Commit)
[testenv:gate]
description = Run correctness checks: Hypothesis (Property), Diff-Cover
deps =
    hypothesis
    diff-cover
    pytest
    pytest-asyncio
    pytest-cov
commands =
    pytest -m "not slow" --hypothesis-profile=ci --cov=claude_memory --cov=dashboard --cov-report=xml
    diff-cover coverage.xml --compare-branch=master --fail-under=100

# Tier 2: The Hammer (Brutal, Scheduled)
[testenv:hammer]
description = Run deep analysis: Security Linting, Dependency Audit, Secret Scanning
skip_install = true
deps =
    bandit
    pip-audit
    detect-secrets
commands =
    # Security Linting
    bandit -r src -s B101,B104,B112,B404,B602,B603,B607 -q

    # Dependency Vulnerability Check (ignore pip's own CVE in tox venv)
    pip-audit --ignore-vuln CVE-2026-1703

    # Secret Scanning
    detect-secrets scan src

# On-demand: Mutation Testing (slow but finds edge cases)
# Run with: tox -e mutate (not in default envlist)
[testenv:mutate]
description = Mutation testing — finds edge cases by injecting faults
deps =
    mutatest
    pytest
    pytest-asyncio
    pytest-cov
commands =
    mutatest -s src -t "pytest -m 'not slow'" --rseed 42

# Tier 3: The Polish (Documentation, Typos)
[testenv:polish]
description = Run polish checks: Codespell, Docstr-coverage
deps =
    codespell
    docstr-coverage
commands =
    codespell src tests
    docstr-coverage src
