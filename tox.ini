[tox]
envlist = pulse, gate, forge, hammer, polish
isolated_build = True

[testenv]
allowlist_externals = poetry, python

# Tier 0: The Pulse (Fast, Frequent)
[testenv:pulse]
description = Run fast checks: Ruff (lint/format), Mypy, Pytest (Unit)
allowlist_externals = python
deps =
    ruff
    mypy
    pytest
    pytest-asyncio
    pytest-cov
    pytest-randomly
    pre-commit
commands =
    python -c "print('\n[1/4] Ruff lint...')"
    ruff check src tests
    python -c "print('\n[2/4] Ruff format...')"
    ruff format --check src tests
    python -c "print('\n[3/4] Mypy...')"
    mypy src
    python -c "print('\n[4/4] Pytest + coverage...')"
    pytest -m "not slow" --cov=claude_memory --cov=dashboard --cov-report=term-missing --cov-fail-under=90

# Tier 1: The Gate (Correctness, Pre-Commit)
[testenv:gate]
description = Run correctness checks: Hypothesis (Property), Diff-Cover
allowlist_externals = python
deps =
    hypothesis
    diff-cover
    pytest
    pytest-asyncio
    pytest-cov
    pytest-randomly
commands =
    python -c "print('\n[1/2] Pytest + Hypothesis...')"
    pytest -m "not slow" --hypothesis-profile=ci --cov=claude_memory --cov=dashboard --cov-report=xml
    python -c "print('\n[2/2] Diff-cover...')"
    diff-cover coverage.xml --compare-branch=master --fail-under=100

# Tier 2: The Forge (Mutation Testing)
[testenv:forge]
description = Mutation testing — finds edge cases by injecting faults
allowlist_externals = python
deps =
    mutatest
    pytest
    pytest-asyncio
    pytest-cov
commands =
    python -c "print('\n[1/1] Mutatest...')"
    mutatest -s src -t "pytest -m 'not slow'" --rseed 42

# Tier 3: The Hammer (Brutal, Scheduled)
[testenv:hammer]
description = Run deep analysis: Security Linting, Dependency Audit, Secret Scanning
skip_install = true
allowlist_externals = python
deps =
    bandit
    pip-audit
    detect-secrets
commands =
    python -c "print('\n[1/3] Bandit (security lint)...')"
    bandit -r src -s B101,B104,B112,B404,B602,B603,B607 -q

    python -c "print('\n[2/3] Pip-audit (dependency check)...')"
    pip-audit --ignore-vuln CVE-2026-1703

    python -c "print('\n[3/3] Detect-secrets...')"
    detect-secrets scan src

# Tier 4: The Polish (Documentation, Typos)
[testenv:polish]
description = Run polish checks: Codespell, Docstr-coverage
allowlist_externals = python
deps =
    codespell
    docstr-coverage
commands =
    python -c "print('\n[1/2] Codespell...')"
    codespell src tests
    python -c "print('\n[2/2] Docstr-coverage...')"
    docstr-coverage src -v 2
