[tox]
envlist = pulse, gate, hammer, polish
isolated_build = True

[testenv]
allowlist_externals = poetry

# Tier 0: The Pulse (Fast, Frequent)
[testenv:pulse]
description = Run fast checks: Ruff (lint/format), Pytest (Unit), Pre-commit
deps =
    ruff
    mypy
    pytest
    pytest-asyncio
    pytest-cov
    pre-commit
commands =
    ruff check src tests
    ruff format --check src tests
    mypy src
    pytest -m "not slow" --cov=claude_memory --cov=dashboard --cov-report=term-missing --cov-fail-under=30

# Tier 1: The Gate (Correctness, Pre-Commit)
[testenv:gate]
description = Run correctness checks: Hypothesis (Property), Diff-Cover
deps =
    hypothesis
    diff-cover
    pytest
    pytest-asyncio
commands =
    pytest -m "not slow" --hypothesis-profile=ci
    diff-cover coverage.xml --compare-branch=main --fail-under=100

# Tier 2: The Hammer (Brutal, Scheduled)
[testenv:hammer]
description = Run deep analysis: Mutation, Symbolic, Security, Static
deps =
    mutatest
    crosshair-tool
    semgrep
    bandit
    pip-audit
    detect-secrets
commands =
    # Mutation Testing (Windows compatible)
    mutatest -s src -t "pytest -m 'not slow'"

    # Security Linting
    bandit -r src -c pyproject.toml

    # Dependency Check
    pip-audit

    # Secret Scanning
    detect-secrets scan src

    # Semgrep (Static Analysis) - requires external install usually but pip package exists
    semgrep scan --config=auto src

    # Symbolic Execution (Experimental)
    # crosshair check src/claude_memory/utils.py  <-- Example, enabling broadly might be too slow

# Tier 3: The Polish (Documentation, Typos)
[testenv:polish]
description = Run polish checks: Codespell, Docstr-coverage
deps =
    codespell
    docstr-coverage
commands =
    codespell src tests
    docstr-coverage src
